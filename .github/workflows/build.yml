name: "Build and Cache"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Update OpenCode Version"]
    types:
      - completed
    branches: [ main ]

jobs:
  build:
    # Only run if not triggered by workflow_run or if the workflow succeeded
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Nix
      uses: cachix/install-nix-action@v24
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          sandbox = false
    
    - name: Setup Cachix
      uses: cachix/cachix-action@v14
      if: github.ref == 'refs/heads/main'
      with:
        name: opencode-nix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    
    - name: Build opencode
      run: |
        nix build .#opencode --print-build-logs
        
    - name: Test opencode functionality
      run: |
        # Test basic functionality
        ./result/bin/opencode --version
        
        # Test wrapper script permissions
        test -x ./result/bin/opencode
        
        # Verify binary structure
        test -f ./result/bin/opencode
        test -f ./result/bin/opencode-bin
        
    - name: Test on macOS permission paths
      if: matrix.os == 'macos-latest'
      run: |
        # Test stable binary path creation
        mkdir -p ~/.local/bin
        ln -sf ./result/bin/opencode ~/.local/bin/opencode
        ~/.local/bin/opencode --version
        
    - name: Push to Cachix
      if: github.ref == 'refs/heads/main'
      run: |
        nix build .#opencode --json | jq -r '.[].outputs.out' | cachix push opencode-nix